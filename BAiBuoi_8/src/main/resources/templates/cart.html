<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container">
<h2 class="mt-4">Giỏ hàng của bạn</h2>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<table class="table table-bordered mt-3">
    <thead class="table-info">
    <tr>
        <th>Ảnh</th>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Tổng tiền món</th>
        <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${cartItems}">
        <td><img th:src="${item.image}" width="50"></td>
        <td th:text="${item.name}"></td>
        <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
        <td>
            <form th:action="@{/cart/update}" method="post" class="d-flex">
                <input type="hidden" name="id" th:value="${item.productId}">
                <input type="number" name="qty" th:value="${item.quantity}" class="form-control form-control-sm" style="width: 70px;" onchange="this.form.submit()">
            </form>
        </td>
        <td th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
        <td>
            <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn btn-sm btn-danger">Xóa</a>
        </td>
    </tr>
    <tr th:if="${cartItems.isEmpty()}">
        <td colspan="6" class="text-center">Giỏ hàng trống. <a href="/products">Tiếp tục mua sắm</a></td>
    </tr>
    </tbody>
</table>

<div class="d-flex justify-content-between align-items-center mt-3" th:if="${!cartItems.isEmpty()}">
    <h4>Tổng cộng: <span class="text-danger" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></h4>
    <div>
        <a href="/cart/clear" class="btn btn-outline-danger">Xóa tất cả</a>
        <a href="/products" class="btn btn-secondary">Tiếp tục mua hàng</a>
        <a href="/checkout" class="btn btn-success">Đặt hàng ngay</a>
    </div>
</div>
</body>
</html>
