<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt hàng thành công</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container text-center mt-5">
<div class="card p-5 shadow">
    <h1 class="text-success">🎉 Cảm ơn bạn đã mua hàng!</h1>
    <p class="mt-3">Mã đơn hàng của bạn là: <strong th:text="${order.id}"></strong></p>
    <p>Ngày đặt: <span th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></span></p>
    <p>Tổng tiền thanh toán: <h3 class="text-danger" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></h3></p>

    <div class="mt-4">
        <a href="/products" class="btn btn-primary">Tiếp tục mua sắm</a>
    </div>
</div>
<script>
    alert("Đặt hàng thành công! Cảm ơn bạn.");
</script>
</body>
</html>
