<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Cửa hàng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container">
<div class="mt-4 d-flex justify-content-between">
    <h2>Danh sách sản phẩm</h2>
    <a sec:authorize="hasRole('ADMIN')" href="/admin/products/add" class="btn btn-success">Thêm mới</a>
</div>

<!-- Bộ lọc tổng hợp -->
<form th:action="@{/products}" method="get" class="row g-2 mt-3 mb-4">
    <div class="col-md-3">
        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm tên...">
    </div>
    <div class="col-md-3">
        <select name="categoryId" class="form-select">
            <option value="">Tất cả danh mục</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                    th:selected="${c.id == categoryId}"></option>
        </select>
    </div>
    <div class="col-md-2">
        <select name="sort" class="form-select">
            <option value="asc" th:selected="${sort == 'asc'}">Giá tăng dần</option>
            <option value="desc" th:selected="${sort == 'desc'}">Giá giảm dần</option>
        </select>
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary w-100">Lọc & Tìm</button>
    </div>
</form>

<table class="table table-bordered">
    <thead class="table-light">
    <tr>
        <th>Ảnh</th><th>Tên</th><th>Giá</th><th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${products}">
        <td><img th:src="${p.image}" width="50"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
        <td>
            <!-- Tìm đoạn nút thêm vào giỏ và sửa thành: -->
            <a th:href="@{/cart/add/{id}(id=${p.id})}" class="btn btn-sm btn-primary">Thêm vào giỏ</a>
        </td>
    </tr>
    </tbody>
</table>

<!-- Thanh Phân Trang -->
<nav th:if="${totalPages > 0}">
    <ul class="pagination justify-content-center">
        <!-- Nút Previous -->
        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link" th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">Trước</a>
        </li>

        <!-- Số trang -->
        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link" th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}" th:text="${i + 1}"></a>
        </li>

        <!-- Nút Next -->
        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
            <a class="page-link" th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">Sau</a>
        </li>
    </ul>
</nav>
</body>
</html>
